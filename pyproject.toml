[project]
name = "rakuten-multimodal-classifier"
version = "0.1.0"
description = "Unified Image and Text Classification Pipeline for Rakuten Data"
readme = "README.md"
requires-python = ">=3.11,<3.13"

# Absolute minimum base – shared utilities, config, data handling
dependencies = [
  "numpy>=2.0.0,<3.0.0",
  "pandas>=2.2.0,<4.0.0",
  "pyyaml==6.0.3",
  "python-dateutil==2.9.0.post0",
  "typing-extensions>=4.10.0",
  "tzdata>=2025.0",
]

[project.optional-dependencies]

# Shared ML base (avoids redundancy across image/text extras)
ml-core = [
  "torch",
  "scikit-learn>=1.5.2",
  "tqdm>=4.66.0",
]

# Image training + inference
image = [
  "rakuten-multimodal-classifier[ml-core]",
  "torchvision",
  "pillow==10.4.0",
]

# Text training + inference
text = [
  "rakuten-multimodal-classifier[ml-core]",
  "transformers>=4.35.0",
  "accelerate>=0.23.0",
]

# API (kept lean – torch/transformers only while TODO is still open)
api = [
  "fastapi>=0.135.1",
  "uvicorn[standard]>=0.42.0",
  "pillow==10.4.0",
  # TODO: remove once inference is fully isolated from the API:
  "torch",
  "torchvision",
  "transformers>=4.35.0",
]

# Data versioning + experiment tracking (was lost in V2 during the merge)
data = [
  "dvc[s3]>=3.0.0",
  "dagshub>=0.3.0",
  "mlflow>=2.22.1",
]

# Convenience meta-extras
training = ["rakuten-multimodal-classifier[image,text,data]"]
all     = ["rakuten-multimodal-classifier[image,text,api,data]"]

# -----------------------------------------------------------------------------
[dependency-groups]
dev = [
  "ipykernel>=6.25.0",
  "matplotlib>=3.8.0",
  "pytest>=7.4.0",
]

# -----------------------------------------------------------------------------
# uv: Plattformspezifische PyTorch-Wheels (CPU vs CUDA) via alternate indexes
#
# - macOS:         CPU/MPS-Wheels (kein CUDA)
# - Linux/Windows: CUDA 12.1 Wheels
#
# WICHTIG: ml-core, image, text, api, training und all sind alle aufgeführt,
#          da torch in mehreren Extras vorkommt.
# -----------------------------------------------------------------------------

[[tool.uv.index]]
name = "pytorch-cpu"
url  = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu121"
url  = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu121", marker = "(sys_platform == 'linux' or sys_platform == 'win32') and (extra == 'ml-core' or extra == 'image' or extra == 'text' or extra == 'api' or extra == 'training' or extra == 'all')" },
  { index = "pytorch-cpu",   marker = "sys_platform == 'darwin' and (extra == 'ml-core' or extra == 'image' or extra == 'text' or extra == 'api' or extra == 'training' or extra == 'all')" },
]
torchvision = [
  { index = "pytorch-cu121", marker = "(sys_platform == 'linux' or sys_platform == 'win32') and (extra == 'image' or extra == 'api' or extra == 'training' or extra == 'all')" },
  { index = "pytorch-cpu",   marker = "sys_platform == 'darwin' and (extra == 'image' or extra == 'api' or extra == 'training' or extra == 'all')" },
]

[project]
name = "rakuten-multimodal-classifier"
version = "0.1.0"
description = "Unified Image and Text Classification Pipeline for Rakuten Data"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "torch==2.10.0",
    "torchvision==0.25.0",
    "transformers>=4.35.0",
    "pandas>=2.2.0,<3.0.0",
    "numpy==2.4.3",
    "scikit-learn==1.8.0",
    "pillow==10.4.0",
    "pyyaml==6.0.3",
    "tqdm>=4.66.0",
    "accelerate>=0.23.0",
    "filelock==3.25.2",
    "fsspec==2026.2.0",
    "jinja2==3.1.6",
    "joblib==1.5.3",
    "markupsafe==3.0.3",
    "mpmath==1.3.0",
    "networkx==3.6.1",
    "python-dateutil==2.9.0.post0",
    "scipy==1.17.1",
    "six==1.17.0",
    "sympy==1.14.0",
    "threadpoolctl==3.6.0",
    "typing-extensions==4.15.0",
    "tzdata==2025.3",
    "uvicorn>=0.42.0",
    "fastapi>=0.135.1",
    "httptools>=0.7.1",
]

[project.optional-dependencies]
# Image training + inference
image = [
  "torch",
  "torchvision",
  "pillow==10.4.0",
  "scikit-learn>=1.5.2",
  "tqdm==4.67.0",
]

# Text training + inference
text = [
  "torch",
  "transformers>=4.35.0",
  "accelerate>=0.23.0",
  "scikit-learn>=1.5.2",
  "tqdm>=4.66.0",
]

# API
api = [
  "torch", # TODO: remove torch (isolate api)
  "torchvision", # TODO: remove torchvision (isolate api)
  "transformers>=4.35.0", # TODO: remove transformers (isolate api)
  "fastapi>=0.135.1",
  "uvicorn>=0.42.0",
  "pillow==10.4.0",
]

# Data versioning + experiment tracking
data = [
  "dvc[s3]>=3.0.0",
  "dagshub>=0.3.0",
  "mlflow>=2.22.1,<=2.22.2",
]

# Convenience meta-extras
training = ["rakuten-multimodal-classifier[image,text]"]
all = ["rakuten-multimodal-classifier[image,text,api,data]"]

[dependency-groups]
dev = [
    "ipykernel>=6.25.0",
    "matplotlib>=3.8.0",
    "pytest>=7.4.0",
]

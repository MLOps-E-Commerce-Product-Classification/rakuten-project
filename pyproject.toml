[project]
name = "rakuten-multimodal-classifier"
version = "0.1.0"
description = "Unified Image and Text Classification Pipeline for Rakuten Data"
readme = "README.md"
requires-python = ">=3.11,<3.13"

# Keep the core as small as possible (shared utilities/config/data handling)
dependencies = [
  "numpy==2.4.3",
  "pandas==3.0.1",
  "pyyaml==6.0.3",
  "python-dateutil==2.9.0.post0",
  "typing-extensions==4.15.0",
  "tzdata==2025.3",
  "six==1.17.0",
]

[project.optional-dependencies]
# Image training + inference
image = [
  "torch",
  "torchvision",
  "pillow==10.4.0",
  "scikit-learn>=1.5.2",
  "tqdm==4.67.0",
]

# Text training + inference
text = [
  "torch",
  "transformers>=4.35.0",
  "accelerate>=0.23.0",
  "scikit-learn>=1.5.2",
  "tqdm>=4.66.0",
]

# API
api = [
  "torch", # TODO: remove torch (isolate api)
  "torchvision", # TODO: remove torchvision (isolate api)
  "transformers>=4.35.0", # TODO: remove transformers (isolate api)
  "fastapi>=0.135.1",
  "uvicorn>=0.42.0",
  "pillow==10.4.0",
]

# Convenience meta-extras
training = ["rakuten-multimodal-classifier[image,text]"]
all = ["rakuten-multimodal-classifier[image,text,api]"]

[dependency-groups]
dev = [
  "ipykernel>=6.25.0",
  "matplotlib>=3.8.0",
  "pytest>=7.4.0",
]

# -----------------------------------------------------------------------------
# uv: platform-specific PyTorch wheels (CPU vs CUDA) via alternate indexes
#
# Notes:
# - macOS has no CUDA; typically you want the default (CPU/MPS-capable) wheels.
# - Linux/Windows GPU training typically uses CUDA wheels (example: cu121).
# - We route torch/torchvision to the appropriate index depending on OS.
#
# IMPORTANT:
# - The marker expression MUST be parenthesized correctly.
# - Only apply these sources for the training extras (image/text).
# -----------------------------------------------------------------------------

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu121"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu121", marker = "(sys_platform == 'linux' or sys_platform == 'win32') and (extra == 'image' or extra == 'text' or extra == 'training' or extra == 'all' or extra == 'api')" },
  { index = "pytorch-cpu", marker = "(sys_platform == 'darwin') and (extra == 'image' or extra == 'text' or extra == 'training' or extra == 'all' or extra == 'api')" },
]

torchvision = [
  { index = "pytorch-cu121", marker = "(sys_platform == 'linux' or sys_platform == 'win32') and (extra == 'image' or extra == 'text' or extra == 'training' or extra == 'all' or extra == 'api')" },
  { index = "pytorch-cpu", marker = "(sys_platform == 'darwin') and (extra == 'image' or extra == 'text' or extra == 'training' or extra == 'all' or extra == 'api')" },
]

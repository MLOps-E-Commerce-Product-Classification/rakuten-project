services:

  streamlit:
    image: ${STREAMLIT_IMAGE:-rakutenml/rakuten-streamlit:latest}
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/streamlit/data
    networks:
      - mlops-network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - mlops-network
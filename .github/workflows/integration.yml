name: CI

on:
  push:
    branches: [ "main", "ci_dockerhub"]
  pull_request:
    branches: [ "main" ]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: rakuten_text_service
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:

  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run tests
        run: |
          export MPLBACKEND=Agg
          uv run pytest tests/


  build:
    name: Build & Push Train/Eval/Inference Images
    runs-on: ubuntu-latest
    #needs: test
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - name: train-text
            dockerfile: docker/Dockerfile.train-text
          - name: evaluate-text
            dockerfile: docker/Dockerfile.evaluate-text
          - name: inference
            dockerfile: docker/Dockerfile.inference

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          docker build \
            --cache-from=${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:latest \
            -f ${{ matrix.dockerfile }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:latest \
            .
          

          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:latest


  bento:
    name: Build & Push Bento Service
    runs-on: ubuntu-latest
    #needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Build Bento
        run: uv run bentoml build

      - name: Containerize Bento
        run: |
          BENTO_TAG=$(uv run bentoml list -o json | python -c "import sys,json; print(json.load(sys.stdin)[0]['tag'])")
          uv run bentoml containerize $BENTO_TAG

      - name: Tag image
        run: |
          docker tag rakuten_text_service:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker tag rakuten_text_service:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
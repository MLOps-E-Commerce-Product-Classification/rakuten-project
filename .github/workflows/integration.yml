name: CI

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: rakuten-text-service
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
  UV_LINK_MODE: copy

jobs:
  precommit:
    name: Run pre-commit checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    needs: precommit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --all-extras --group dev
      - name: Run tests
        run: |
          export MPLBACKEND=Agg
          uv run pytest -vv --disable-warnings

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: train-text
            dockerfile: docker/Dockerfile.train-text
            tag: cpu
            device: cpu
          - name: train-text
            dockerfile: docker/Dockerfile.train-text
            tag: cu121
            device: cu121
          - name: evaluate-text
            dockerfile: docker/Dockerfile.evaluate-text
            tag: cpu
            device: cpu
          - name: evaluate-text
            dockerfile: docker/Dockerfile.evaluate-text
            tag: cu121
            device: cu121
          - name: inference
            dockerfile: docker/Dockerfile.inference
            tag: cpu
            device: cpu
          - name: inference
            dockerfile: docker/Dockerfile.inference
            tag: cu121
            device: cu121
          - name: streamlit
            dockerfile: docker/Dockerfile.streamlit
            tag: cpu
            device: cpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optimization: Maximize disk space for heavy ML images (Torch + CUDA)
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.name }}:${{ matrix.tag }}
          build-args: |
            DEVICE=${{ matrix.device }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bento:
    name: Build & Push Bento Service
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          docker system prune -af || true

      - name: Build Bento and Containerize
        run: |
          uv python install ${{ env.PYTHON_VERSION }}
          uv sync --all-extras --group dev

          export MLFLOW_TRACKING_URI=https://dagshub.com/Mlops2026/rakuten-project.mlflow
          export MLFLOW_TRACKING_USERNAME=token
          export MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_USER_TOKEN }}

          uv run python -m src.serving.sync_mlflow_to_bento --model-name text-classifier --alias production
          uv run bentoml build

          BENTO_TAG=$(uv run bentoml list -o json | python -c "import sys,json; print(json.load(sys.stdin)[0]['tag'])")
          uv run bentoml containerize $BENTO_TAG --image-tag ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

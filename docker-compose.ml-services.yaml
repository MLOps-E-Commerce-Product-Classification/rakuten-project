services:

  train-text:
    image: rakuten-ml/train-text:${DEVICE:-cpu}
    build:
      context: .
      dockerfile: docker/Dockerfile.train-text
      args:
        DEVICE: ${DEVICE:-cpu}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}

    env_file:
      - .env

    environment:
      DEVICE: ${DEVICE:-cpu}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}

    entrypoint: ["./entrypoint.sh"]

    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
      - ./results:/app/results

      # DVC + reproducibility
      - ./.dvc:/app/.dvc
      - ./dvc.lock:/app/dvc.lock
      - ./dvc.yaml:/app/dvc.yaml
      - ./params.yaml:/app/params.yaml
      - ./.dvcignore:/app/.dvcignore

      # Git context
      - ./.git:/app/.git
      - ~/.gitconfig:/home/appuser/.gitconfig:ro
      - ~/.ssh:/home/appuser/.ssh:ro

      # DVC cache
      - dvc-cache:/home/appuser/.cache/dvc

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - mlops-network

  finetune-text:
    image: rakuten-ml/train-text:${DEVICE:-cpu}
    environment:
      FINETUNE_MODE: "true"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
    networks:
      - mlops-network

  evaluate-text:
    image: rakuten-ml/evaluate-text:latest
    volumes:
      - ./results:/app/results
    networks:
      - mlops-network

  inference:
    image: rakuten-ml/inference:latest
    volumes:
      - ./results:/app/results
    networks:
      - mlops-network

  bentoml:
    image: ${BENTOML_IMAGE:-rakutenml/rakuten-text-service:latest}
    ports:
      - "3000:3000"
    networks:
      - mlops-network
  
  streamlit:
    image: ${STREAMLIT_IMAGE:-rakutenml/rakuten-streamlit:latest}
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
    networks:
      - mlops-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - mlops-network


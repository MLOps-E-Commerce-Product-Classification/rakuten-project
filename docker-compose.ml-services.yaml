services:

  # ============================================================
  # TRAINING (full reproducible ML experiment container)
  # ============================================================
  train-text:
    image: rakuten-ml/train-text:${DEVICE:-cpu}

    build:
      context: .
      dockerfile: docker/Dockerfile.train-text
      args:
        DEVICE: ${DEVICE:-cpu}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}

    env_file:
      - .env

    environment:
      DEVICE: ${DEVICE:-cpu}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}

    entrypoint: ["./entrypoint.sh"]

    volumes:
      # core project
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
      - ./results:/app/results

      # reproducibility (DVC + experiment tracking)
      - ./.dvc:/app/.dvc
      - ./dvc.lock:/app/dvc.lock
      - ./dvc.yaml:/app/dvc.yaml
      - ./params.yaml:/app/params.yaml
      - ./.dvcignore:/app/.dvcignore

      # git context (critical for traceability)
      - ./.git:/app/.git
      - ~/.gitconfig:/home/appuser/.gitconfig:ro
      - ~/.ssh:/home/appuser/.ssh:ro

      # caching
      - dvc-cache:/home/appuser/.cache/dvc

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - mlops-network


  # ============================================================
  # FINETUNING (same stack, different execution mode)
  # ============================================================
  finetune-text:
    image: rakuten-ml/train-text:${DEVICE:-cpu}

    build:
      context: .
      dockerfile: docker/Dockerfile.train-text
      args:
        DEVICE: ${DEVICE:-cpu}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}

    env_file:
      - .env

    environment:
      DEVICE: ${DEVICE:-cpu}
      FINETUNE_MODE: "true"
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}

    entrypoint: ["./entrypoint.sh"]

    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/app/src
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
      - ./results:/app/results

      - ./.dvc:/app/.dvc
      - ./dvc.lock:/app/dvc.lock
      - ./dvc.yaml:/app/dvc.yaml
      - ./params.yaml:/app/params.yaml
      - ./.dvcignore:/app/.dvcignore

      - ./.git:/app/.git
      - ~/.gitconfig:/home/appuser/.gitconfig:ro
      - ~/.ssh:/home/appuser/.ssh:ro

      - dvc-cache:/home/appuser/.cache/dvc

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - mlops-network


  # ============================================================
  # EVALUATION (fully reproducible, no training side effects)
  # ============================================================
  evaluate-text:
    image: rakuten-ml/evaluate-text:latest

    build:
      context: .
      dockerfile: docker/Dockerfile.evaluate-text

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
      - ./results:/app/results

      # evaluation reproducibility context
      - ./dvc.lock:/app/dvc.lock
      - ./params.yaml:/app/params.yaml
      - ./.git:/app/.git

    networks:
      - mlops-network


  # ============================================================
  # BENTOML (serving layer)
  # ============================================================
  bentoml:
    image: ${BENTOML_IMAGE:-rakutenml/rakuten-text-service:latest}
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - mlops-network
    restart: unless-stopped
    

  
  streamlit:
    image: ${STREAMLIT_IMAGE:-rakutenml/rakuten-streamlit:latest}
    ports:
      - "8502:8502"
    volumes:
      - ./data:/app/data
    networks:
      - mlops-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - mlops-network
    restart: unless-stopped


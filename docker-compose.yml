services:
  train-text:
    build:
      context: .
      dockerfile: docker/Dockerfile.train-text
      args:
        DEVICE: ${DEVICE:-cpu}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    env_file:
      - .env
    environment:
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  inference:
      build:
        context: .
        dockerfile: docker/Dockerfile.inference
      volumes:
        - ./results:/app/results
        - ./models:/app/models:ro
        - ./configs:/app/configs:ro
        - ~/.cache/huggingface:/home/appuser/.cache/huggingface
  evaluate-text:
      build:
        context: .
        dockerfile: docker/Dockerfile.evaluate-text
        args:
          DEVICE: ${DEVICE:-cpu}
          GIT_COMMIT: ${GIT_COMMIT:-unknown}
          GIT_BRANCH: ${GIT_BRANCH:-unknown}
      env_file:
        - .env
      environment:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        MPLCONFIGDIR: /tmp/matplotlib
      volumes:
        - ./data:/app/data:ro
        - ./models:/app/models:ro
        - ./configs:/app/configs:ro
        - ./artifacts:/app/artifacts:ro
        - ./results:/app/results
        - ./logs:/app/logs
        - ~/.cache/huggingface:/home/appuser/.cache/huggingface
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]

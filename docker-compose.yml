services:
  train-text:
    build:
      context: .
      dockerfile: docker/Dockerfile.train-text
      args:
        DEVICE: ${DEVICE:-cpu}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    env_file:
      - .env
    environment:
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  bento-text-service:
    image: rakuten_text_service:latest
    ports:
      - "3000:3000"
    environment:
      TORCH_FORCE_NO_WEIGHTS_ONLY_LOAD: "1"
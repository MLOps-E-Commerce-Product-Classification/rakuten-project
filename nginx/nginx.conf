events {
    worker_connections 1024;
}

http {
    # ──────────────────────────────────────────────
    # Rate Limiting
    # ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/m;

    # ──────────────────────────────────────────────
    # Security Headers
    # ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ==========================================
    # HTTP Server (Port 80)
    # ==========================================
    server {
        listen 80;
        server_name localhost;

        # -- HTTPS ready – uncomment when certificate is available --
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;

        # -- HTTP to HTTPS redirect – uncomment when HTTPS is active --
        # if ($scheme = http) {
        #     return 301 https://$host$request_uri;
        # }

        # ──────────────────────────────────────────────
        # Health check – public, no auth required
        # ──────────────────────────────────────────────
        location = /health {
            return 200 "OK\n";
        }

        # ──────────────────────────────────────────────
        # STREAMLIT – Root, publicly accessible
        # ──────────────────────────────────────────────
        location / {
            proxy_pass http://streamlit:8502;

            # WebSocket support – required for Streamlit
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # Prevent timeouts during long predictions
            proxy_read_timeout 300;

            limit_req zone=general burst=50 nodelay;
        }

        # ──────────────────────────────────────────────
        # AIRFLOW – internal only, protected by Basic Auth
        # ──────────────────────────────────────────────
        location /airflow/ {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://airflow-webserver:8080/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=general burst=20 nodelay;
        }

        # ──────────────────────────────────────────────
        # GRAFANA – internal only, protected by Basic Auth
        # ──────────────────────────────────────────────
        location /grafana/ {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;

            # WebSocket support – required for Grafana live updates
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=general burst=20 nodelay;
        }

        # ──────────────────────────────────────────────
        # FLOWER – internal only, protected by Basic Auth
        # ──────────────────────────────────────────────
        location /flower/ {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://flower:5555/flower/;
            proxy_http_version 1.1;

            # WebSocket support – required for Flower live updates
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=general burst=20 nodelay;
        }

        # ──────────────────────────────────────────────
        # PROMETHEUS – internal only, protected by Basic Auth
        # Optional: remove this block if Prometheus should stay fully internal
        # ──────────────────────────────────────────────
        location /prometheus/ {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://prometheus:9090/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            limit_req zone=general burst=20 nodelay;
        }
    }
}

events {
    worker_connections 1024;
}

http {
    map_hash_bucket_size 128;
    map_hash_max_size 1024;

    # ──────────────────────────────────────────────
    # Rate Limiting – throttles brute-force attacks
    # ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/m;

    # ──────────────────────────────────────────────
    # API key validation via map
    # Allowed keys are loaded from file
    # ──────────────────────────────────────────────
    map $http_x_api_key $api_key_valid {
        default 0;
        include /etc/nginx/api_keys.conf;
    }

    # ==========================================
    # HTTP Server (Port 80)
    # ==========================================
    server {
        listen 80;
        server_name localhost;

        # -- HTTPS ready – uncomment when certificate is available --
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;

        # -- HTTP -> HTTPS redirect – uncomment when HTTPS is active --
        # if ($scheme = http) {
        #     return 301 https://$host$request_uri;
        # }

        # ──────────────────────────────────────────────
        # Security Headers
        # ──────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # -- HSTS – uncomment when HTTPS is active --
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ──────────────────────────────────────────────
        # Health check – public, no auth required
        # ──────────────────────────────────────────────
        location = /health {
            return 200 "OK\n";
        }

        # ──────────────────────────────────────────────
        # Login – Basic Auth + rate limit, no API key
        # This is where you obtain the JWT token
        # ──────────────────────────────────────────────
        location /bentoml/login {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req            zone=login_limit burst=3 nodelay;

            proxy_pass         http://bento-text-service:3000/login;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        # ──────────────────────────────────────────────
        # API endpoints – API key + rate limit
        # JWT is additionally validated by the BentoML service
        # -> Triple-layer security: API key (Nginx) + JWT (BentoML) + rate limit
        # ──────────────────────────────────────────────
        location /bentoml/predict {
            # Validate API key
            if ($api_key_valid = 0) {
                return 401 '{"error": "Invalid or missing API key. Set X-API-Key header."}';
            }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://bento-text-service:3000/predict;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        location /bentoml/predict_batch {
            # Validate API key
            if ($api_key_valid = 0) {
                return 401 '{"error": "Invalid or missing API key. Set X-API-Key header."}';
            }

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://bento-text-service:3000/predict_batch;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        # ──────────────────────────────────────────────
        # BentoML health / other endpoints
        # ──────────────────────────────────────────────
        location /bentoml/ {
            auth_basic           "Rakuten MLOps - Restricted Access";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass         http://bento-text-service:3000/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
        }

        # ──────────────────────────────────────────────
        # Root -> redirect to BentoML
        # ──────────────────────────────────────────────
        location / {
            return 302 /bentoml/;
        }
    }
}

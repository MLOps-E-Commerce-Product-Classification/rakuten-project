training:
  seed: 42
  batch_size: 32
  num_epochs: 1
  learning_rate: 1e-6
  weight_decay: 0.01
  num_workers: 0
  subset: 0

model:
  name: bert-base-multilingual-cased
  mlflow_model_name: "text-classifier"
  mlflow_alias: "production"

data:
  label_col: prdtypecode
  designation_col: designation
  description_col: description
  return_quality_report: false

  new_data_ratio: 0.3

split:
  val_size: 0.1
  test_size: 0.1

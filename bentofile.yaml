service: "src.serving.bento_service:TextBentoService"
description: "JWT-protected BentoML text service for Rakuten category prediction"
labels:
  owner: "MLOps-E-Commerce-Product-Classification"
  project: "rakuten-text-serving"
include:
  - "src/"
  - "configs/text_preprocessing_config.yaml"
  - "artifacts/deployment_manifest.json"
models:
  - "text-classifier:latest"
python:
  pip_args:
    - "--extra-index-url"
    - "https://download.pytorch.org/whl/cpu


  packages:
    - "bentoml>=1.4.0,<2.0.0"
    - "mlflow==3.10.1"
    - "pandas>=2.2.0"
    - "torch==2.2.2"
    - "transformers==5.4.0"
    - "accelerate>=0.23.0"
    - "pydantic>=2.11.0"
    - "pyyaml>=6.0.0"
    - "numpy<2.0.0"
    - "huggingface_hub>=0.23.0"
    - "PyJWT>=2.10.1"
    - "boto3"

